<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Plyx — 62 browser-based utility tools</title>
    <meta name="description" content="A collection of 62 utility tools that run entirely in your browser. Password generator, QR code, JSON formatter, color picker, and more. Your tool data stays on your device." />
    <meta name="theme-color" content="#2563eb" />
    <meta name="color-scheme" content="light dark" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Plyx" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Plyx — 62 browser-based utility tools" />
    <meta property="og:description" content="Password, QR, JSON, color, image, hash, base64, and 56 more — all running in your browser." />
    <meta property="og:image" content="/favicon.svg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Plyx — 62 browser-based utility tools" />
    <meta name="twitter:description" content="Password, QR, JSON, color, image, hash, base64, and 56 more — all running in your browser." />
    <meta name="twitter:image" content="/favicon.svg" />

    <!--
      Anonymous visit counting via GoatCounter (https://plyx.goatcounter.com).
      - No cookies, no IP storage, no fingerprinting.
      - Honors Do Not Track automatically.
      - Honors localStorage 'skipgc' flag (toggled by the in-app opt-out).
      - The script is async + defer-equivalent so it never blocks render.
    -->
    <script>
      window.goatcounter = { no_onload: true };
    </script>
    <script
      data-goatcounter="https://plyx.goatcounter.com/count"
      async
      src="//gc.zgo.at/count.js"
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>Plyx requires JavaScript to run. Please enable it in your browser.</noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
